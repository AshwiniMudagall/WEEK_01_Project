<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<nav class="navbar navbar-dark px-3">
<span class="navbar-brand">FieldOps</span>
</nav>

<div class="sidebar">
<a href="dashboard.html">Dashboard</a>
<a href="electricians.html">Electricians</a>
<a href="jobs.html">Jobs</a>
<a href="tasks.html">Tasks</a>
<a href="materials.html">Materials</a>
<a href="reports.html">Reports</a>
<a href="profile.html">Profile</a>
</div>

<div class="main">

<div class="d-flex justify-content-between mb-4">
<h4 class="fw-bold">Dashboard</h4>
<button class="btn btn-dark btn-sm">+ New</button>
</div>

<div class="row g-4">

<div class="col-md-3">
<div class="card p-3 d-flex justify-content-between">
<div>
<p class="text-muted">Electricians</p>
<h4>12</h4>
</div>
<i class="fa fa-users fa-2x text-primary"></i>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 d-flex justify-content-between">
<div>
<p class="text-muted">Jobs</p>
<h4>6</h4>
</div>
<i class="fa fa-briefcase fa-2x text-warning"></i>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 d-flex justify-content-between">
<div>
<p class="text-muted">Tasks</p>
<h4>14</h4>
</div>
<i class="fa fa-tasks fa-2x text-danger"></i>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 d-flex justify-content-between">
<div>
<p class="text-muted">Completed</p>
<h4>21</h4>
</div>
<i class="fa fa-check-circle fa-2x text-success"></i>
</div>
</div>

</div>

<div class="card p-3 mt-4">
<canvas id="chart"></canvas>
</div>

<div class="card p-3 mt-4">
<h6>Recent Activity</h6>
<ul>
<li>New job created</li>
<li>Electrician assigned</li>
<li>Task completed</li>
</ul>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
new Chart(document.getElementById("chart"), {
type:"bar",
data:{labels:["Jobs","Tasks","Completed"],datasets:[{data:[6,14,21]}]}
});
</script>

</body>
</html>
