<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
<form class="bg-white p-4 rounded shadow" style="width:360px">

<h4 class="mb-3 text-center">Register</h4>

<input class="form-control mb-2" placeholder="Name">
<input class="form-control mb-2" placeholder="Phone">
<input class="form-control mb-2" placeholder="Email">

<select class="form-control mb-2">
<option>Admin</option>
<option>Electrician</option>
</select>

<input type="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-dark w-100">Register</button>

</form>
</div>

</body>
</html>
